    <!-- All margins and padding must be zero for the canvas to fill the screen. -->
    <style type="text/css">
        * {
            padding: 0;
            margin: 0;
        }

        html,
        body {
            background: #000;
            color: #fff;
            overflow: hidden;
            touch-action: none;
            -ms-touch-action: none;
        }

        canvas {
            touch-action-delay: none;
            touch-action: none;
            -ms-touch-action: none;
        }

        #links #imgr {
            position: absolute;
            border-radius: 50%;
            width: 75px;
            height: 75px;
            animation: rotatei 4s infinite;
        }

        .imgs {
            position: absolute;
            z-index: 999999999;
            right: 120px;
            top: 10px;
        }

        .arrow {
            position: absolute;
            left: 14px;
            top: 1px;
            animation: uptop 1s infinite;
            -webkit-animation: uptop 1s infinite;
            -moz-animation: uptop 1s infinite;
        }

        @keyframes uptop {
            0% {
                top: 1px;
            }
            50% {
                top: 25px;
            }
            100% {
                top: 1px;
            }
        }

        @keyframes rotatei {
            0% {
                -webkit-transform: rotate(0deg) scale(1);
                -moz-transform: rotate(0deg) scale(1);
                -ms-transform: rotate(0deg) scale(1);
                -o-transform: rotate(0deg) scale(1);
                transform: rotate(0deg) scale(1);
            }
            25% {
                -webkit-transform: rotate(10deg) scale(1.3);
                -moz-transform: rotate(10deg) scale(1.3);
                -ms-transform: rotate(10deg) scale(1.3);
                -o-transform: rotate(10deg) scale(1.3);
                transform: rotate(10deg) scale(1.3);
            }
            50% {
                -webkit-transform: rotate(0deg) scale(1);
                -moz-transform: rotate(0deg) scale(1);
                -ms-transform: rotate(0deg) scale(1);
                -o-transform: rotate(0deg) scale(1);
                transform: rotate(0deg) scale(1);
            }
            75% {
                -webkit-transform: rotate(-10deg) scale(1.3);
                -moz-transform: rotate(-10deg) scale(1.3);
                -ms-transform: rotate(-10deg) scale(1.3);
                -o-transform: rotate(-10deg) scale(1.3);
                transform: rotate(-10deg) scale(1.3);
            }
            100% {
                -webkit-transform: rotate(0deg) scale(1);
                -moz-transform: rotate(0deg) scale(1);
                -ms-transform: rotate(0deg) scale(1);
                -o-transform: rotate(0deg) scale(1);
                transform: rotate(0deg) scale(1);
            }
        }
    </style>

    <!-- 强大的广告拦截系统 -->
    <style>
      /* 隐藏所有可能的广告容器 */
      #imaContainer,
      #imaContainer_new,
      #sdk__advertisement,
      #gmLoadingText,
      iframe[src*="imasdk"],
      iframe[src*="doubleclick"],
      iframe[src*="googlesyndication"],
      iframe[title="Advertisement"],
      div[id*="google_ads"],
      div[id*="aswift"],
      #gamemonetize-sdk,
      #gamemonetize-preload-api {
        display: none !important;
        visibility: hidden !important;
        opacity: 0 !important;
        pointer-events: none !important;
        position: absolute !important;
        left: -9999px !important;
        width: 0 !important;
        height: 0 !important;
      }
    </style>
    <script>
      // 强力广告拦截和屏蔽系统
      (function() {
        // 阻止广告 SDK 加载
        window.SDK_OPTIONS = null;
        
        // 拦截所有广告相关函数
        var originalDefine = window.define;
        window.define = function() {};
        
        // 创建空的 SDK 对象
        window.sdk = {};
        window.sdk.showBanner = function() {};
        window.sdk.requestAd = function() {};
        window.sdk.init = function() {};
        window.sdk.showAd = function() {};
        
        // 拦截广告断点
        window.adBreak = function() {};
        window.adConfig = function() {};
        window.adRequest = function() {};
        
        // 拦截 Gamemonetize SDK
        window.gmSDK = {};
        window.gmSDK.showBanner = function() {};
        window.gmSDK.requestAd = function() {};
        
        // 拦截 GamePlayer
        window.GamePlayer = {};
        window.GamePlayer.ads = {};
        window.GamePlayer.ads.showAd = function() {};
        window.GamePlayer.ads.requestAd = function() {};
        
        // 定期清除动态插入的广告元素
        setInterval(function() {
          var adSelectors = [
            '#imaContainer',
            '#imaContainer_new', 
            '#sdk__advertisement',
            '#gmLoadingText',
            '#gamemonetize-sdk',
            '#gamemonetize-preload-api',
            'iframe[src*="imasdk"]',
            'iframe[src*="doubleclick"]',
            'iframe[src*="googlesyndication"]',
            'iframe[title="Advertisement"]',
            'div[id*="google_ads"]',
            'div[id*="aswift"]',
            '[class*="ad-"]',
            '[class*="ads-"]',
            '[id*="ad-container"]'
          ];
          
          adSelectors.forEach(function(selector) {
            var elements = document.querySelectorAll(selector);
            elements.forEach(function(el) {
              if (el && el.parentNode) {
                try {
                  el.parentNode.removeChild(el);
                } catch(e) {}
              }
            });
          });
        }, 100);
        
        // 拦截 XMLHttpRequest 用于广告请求
        var originalXHR = window.XMLHttpRequest;
        window.XMLHttpRequest = function() {
          var xhr = new originalXHR();
          var originalOpen = xhr.open;
          var originalSend = xhr.send;
          
          xhr.open = function(method, url) {
            // 检查是否为广告请求
            if (url && (
                url.indexOf('doubleclick') > -1 ||
                url.indexOf('googlesyndication') > -1 ||
                url.indexOf('imasdk') > -1 ||
                url.indexOf('gamemonetize') > -1 ||
                url.indexOf('gameplayer') > -1 ||
                url.indexOf('/ad/') > -1 ||
                url.indexOf('adserver') > -1
            )) {
              console.log('Blocked ad request:', url);
              return;
            }
            return originalOpen.apply(xhr, arguments);
          };
          
          xhr.send = function() {
            return originalSend.apply(xhr, arguments);
          };
          
          return xhr;
        };
        
        // 拦截 fetch API
        var originalFetch = window.fetch;
        window.fetch = function(url, options) {
          if (typeof url === 'string' && (
              url.indexOf('doubleclick') > -1 ||
              url.indexOf('googlesyndication') > -1 ||
              url.indexOf('imasdk') > -1 ||
              url.indexOf('gamemonetize') > -1 ||
              url.indexOf('gameplayer') > -1 ||
              url.indexOf('/ad/') > -1 ||
              url.indexOf('adserver') > -1
          )) {
            console.log('Blocked ad fetch:', url);
            return Promise.resolve(new Response('', {status: 403}));
          }
          return originalFetch.apply(window, arguments);
        };
        
        // 阻止动态加载广告脚本
        var originalCreateElement = document.createElement;
        document.createElement = function(tagName) {
          var element = originalCreateElement.apply(document, arguments);
          if (tagName.toLowerCase() === 'script') {
            var originalSetAttribute = element.setAttribute;
            element.setAttribute = function(name, value) {
              if (name === 'src' && value && (
                  value.indexOf('gamemonetize') > -1 ||
                  value.indexOf('gameplayer') > -1 ||
                  value.indexOf('ads') > -1 ||
                  value.indexOf('doubleclick') > -1
              )) {
                console.log('Blocked ad script:', value);
                return;
              }
              return originalSetAttribute.apply(element, arguments);
            };
          }
          return element;
        };
        
        console.log('Ad blocker active!');
      })();
    </script>

    <script>
        // Start the Construct 2 project running on window load.
        jQuery(document).ready(function() {
            // Create new runtime using the c2canvas
            cr_createRuntime("c2canvas");
        });

        // Pause and resume on page becoming visible/invisible
        function onVisibilityChanged() {
            if (document.hidden || document.mozHidden || document.webkitHidden || document.msHidden)
                cr_setSuspended(true);
            else
                cr_setSuspended(false);
        };

        document.addEventListener("visibilitychange", onVisibilityChanged, false);
        document.addEventListener("mozvisibilitychange", onVisibilityChanged, false);
        document.addEventListener("webkitvisibilitychange", onVisibilityChanged, false);
        document.addEventListener("msvisibilitychange", onVisibilityChanged, false);

        if (navigator.serviceWorker && navigator.serviceWorker.register) {
            // Register an empty service worker to trigger web app install banners.
            navigator.serviceWorker.register("sw.js", {
                scope: "./"
            });
        }
    </script>
