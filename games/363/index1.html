<!DOCTYPE HTML>
<html>

<head>
    <meta charset="utf-8">
    <script>
        window._game_loading_timer = Date.now()
    </script>
    <title>Candy game run</title>
    <meta name="format-detection" content="telephone=no">
    <meta name="HandheldFriendly" content="true">
    <meta name="robots" content="noindex,nofollow">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, minimum-scale=1.0, maximum-scale=1.01">
    <style>
        body {
            margin: 0 0 1px 0;
            overflow: hidden
        }

        @font-face {
            font-family: 'ComicSansBold';
            src: url('fonts/ComicSansBold.woff2') format('woff2'), url('fonts/ComicSansBold.woff') format('woff');
            font-weight: normal;
            font-style: normal
        }

        #gameFontPreload {
            position: absolute;
            left: -1000px;
            top: -1000px
        }

        #orientation {
            margin: 0 auto;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url(img/orientation.jpg);
            background-repeat: no-repeat;
            background-position: center;
            background-color: #000;
            z-index: 999;
            display: none
        }
    </style>
    <script src="js/custom-phaser.min.js"></script>
    <script src="js/game.js"></script>
    <style>
        #focusHelper {
            width: 100%;
            height: 100%;
            position: fixed;
            display: none;
            background-color: #000000;
            opacity: 0;
            top: 0px;
            left: 0px;
        }
    </style>
</head>

<body onload="initGame()">
    <div id="gameFontPreload">
        <div style="font-family: ComicSansBold" class="fontPreload">.</div>
    </div>
    <div id="focusHelper"></div>
    <script>
        window.addEventListener("blur", function() {
            document.getElementById('focusHelper').style['display'] = "block"
        })
        window.addEventListener("focus", function() {
            document.getElementById('focusHelper').style['display'] = "none"
        })
    </script>

    <script type="text/javascript">
        window.SDK_OPTIONS = {
            gameId: "sbhh5jndck6kb1959ktqqa7d9ta4kn2d", // Fill the game_id
            onEvent: function(a) {
                switch (a.name) {
                    case "SDK_GAME_PAUSE":
                        // pause game logic / mute audio
                        break;
                    case "SDK_GAME_START":
                        // advertisement done, resume game logic and unmute audio
                        break;
                    case "SDK_READY":
                        // when sdk is ready
                        break;
                    case "SDK_ERROR":
                        // when sdk get error
                        break;
                }
            }
        };
        (function(a, b, c) {
            var d = a.getElementsByTagName(b)[0];
            a.getElementById(c) || (a = a.createElement(b), a.id = c,
                a.src = "https://api.gamemonetize.com/sdk.js", d.parentNode.insertBefore(a, d))
        })(document, "script", "gamemonetize-sdk");
    </script>

</body>

</html>
