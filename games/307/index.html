<style>
  /* 隐藏所有广告容器 */
  #imaContainer,
  #imaContainer_new,
  #sdk__advertisement,
  #gmLoadingText,
  iframe[src*="imasdk"],
  iframe[src*="doubleclick"],
  iframe[src*="googlesyndication"],
  iframe[title="Advertisement"],
  div[id*="google_ads"],
  div[id*="aswift"],
  div[id*="gamemonetize"],
  .ad-banner,
  .ad-container {
    display: none !important;
    visibility: hidden !important;
    opacity: 0 !important;
    pointer-events: none !important;
  }
</style>
<script>
  // 定期清除动态插入的广告元素
  setInterval(function() {
    var adSelectors = [
      '#imaContainer',
      '#imaContainer_new', 
      '#sdk__advertisement',
      '#gmLoadingText',
      'iframe[src*="imasdk"]',
      'iframe[src*="doubleclick"]',
      'iframe[src*="googlesyndication"]',
      'iframe[title="Advertisement"]',
      'div[id*="google_ads"]',
      'div[id*="aswift"]',
      'div[id*="gamemonetize"]',
      '.ad-banner',
      '.ad-container'
    ];
    
    adSelectors.forEach(function(selector) {
      var elements = document.querySelectorAll(selector);
      elements.forEach(function(el) {
        if (el && el.parentNode) {
          el.parentNode.removeChild(el);
        }
      });
    });

    // 阻止广告 SDK 函数
    if (window.sdk_init) window.sdk_init = function() {};
    if (window.sdk) window.sdk = { showBanner: function() {}, requestAd: function() {} };
    if (window.adBreak) window.adBreak = function() {};
    if (window.adConfig) window.adConfig = function() {};
    if (window.ShowAd) window.ShowAd = function() {};
  }, 500);

  // 拦截 gamemonetize SDK 加载
  window.SDK_OPTIONS = {
    gameId: '',
    onEvent: function(a) {}
  };
  
  // 阻止 sdk.js 和 sdk_preload.js 加载
  var originalCreateElement = document.createElement;
  document.createElement = function(tag) {
    var element = originalCreateElement.call(document, tag);
    if (tag === 'script') {
      var originalSetAttribute = element.setAttribute;
      element.setAttribute = function(name, value) {
        if (name === 'src' && (value.includes('gamemonetize') || value.includes('sdk.js'))) {
          console.log('Blocked ad SDK:', value);
          return;
        }
        return originalSetAttribute.call(this, name, value);
      };
    }
    return element;
  };
</script>
