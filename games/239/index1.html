<html>
<head>
    <title>Bigmonsterz.io</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <style>
        html, body {
            height: 100%
        }
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
        }
        iframe {
            display: block;
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            border: 0;
        }
    </style>
</head>
<body>

<iframe id="container" allowfullscreen></iframe>

<script type="application/javascript">
    function getParentUrl() {
        var url = (window.location !== window.parent.location)
            ? (document.referrer && document.referrer !== '')
                ? document.referrer
                : document.location.href
            : document.location.href;
        if (document.referrer.indexOf('localhost') !== -1) {
            url = 'https://gamemonetize.com/';
        }
        return url;
    }
    // Add the self-hosted game url as value of gameUrl.
    var gameUrl = 'https://erigato.space/footballwars/';
    document.getElementById('container').src = gameUrl + '?gamedomain=gamemonetize.com&gm&'+"&portal="+getParentUrl();
</script>



<script>
(function (a, b, c) {
   var d = a.getElementsByTagName(b)[0];
   a.getElementById(c) || (a = a.createElement(b), a.id = c, a.src = "https://api.gamemonetize.com/sdk_preload.js?v=" + Date.now(), d.parentNode.insertBefore(a, d))
})(document, "script", "gamemonetize-preload-api");
</script>


</body>
</html>
