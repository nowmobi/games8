<script type="text/javascript">(function() {
	function GameLoader() {
    this.init = function() {
      this._gameId = "tzvoybc5guau14mv4k852s9sshins9cm";
      this._container = document.getElementById("game");
      this._loader=this._getLoaderData();
      this._hasImpression=false;
      this._hasSuccess=false;
      this._insertGameSDK();
    };
	
	this._getLoaderData=function(){
      return {"enabled":true};
    }

    this._insertGameSDK = function() {
      if (!this._gameId) return;

      window.SDK_OPTIONS = {
        gameId: this._gameId,
        loader:this._loader,
        onLoaderEvent: this._onLoaderEvent.bind(this),
        onEvent: this._onEvent.bind(this)
      };

	(function (a, b, c) {
   var d = a.getElementsByTagName(b)[0];
   a.getElementById(c) || (a = a.createElement(b), a.id = c, a.src = "https://api.gamemonetize.com/sdk.js", d.parentNode.insertBefore(a, d))
})(document, "script", "gamemonetize-sdk"); 
    };

	
	this._onLoaderEvent = function(a) {
      switch (a.name) {
        case "LOADER_DATA":
          this._bridge = a.message.bridge;
          this._game = a.message.game;
          break;
      }
    };

    this._onEvent = function(a) {
	
	switch (a.name) {
        case "SDK_GAME_START":
          this._bridge&&this._loadGame({
            hasImpression: this._hasImpression,
            display:true
          });
          break;
        case "AD_ERROR":
        case "AD_SDK_CANCELED":
          this._hasImpression=false||this._hasSuccess;
          break;
        case "ALL_ADS_COMPLETED":
        case "COMPLETE":
        case "USER_CLOSE":
        case "SKIPPED":
          this._hasImpression=true;
          this._hasSuccess=true;
          break;
		 
      }
    };
  }
  new GameLoader().init();
})();</script>

        <script>
            $(document).ready(function () {
                var oMain = new CMain({
                    area_goal: [{id: 0, probability: 100}, {id: 1, probability: 80}, {id: 2, probability: 60},
                        {id: 3, probability: 80}, {id: 4, probability: 100}, {id: 5, probability: 75},
                        {id: 6, probability: 60}, {id: 7, probability: 50}, {id: 8, probability: 60},

                    num_of_penalty: 15, //MAX NUMBER OF PENALTY FOR END GAME
                    multiplier_step: 0.1, //INCREASE MULTIPLIER EVERY GOAL

                });

                    if (getParamValue('ctl-arcade') === "true") {
                        parent.__ctlArcadeStartSession();
						
                    }
					sdk.showBanner();
                });

                $(oMain).on("end_session", function (evt) {
                    if (getParamValue('ctl-arcade') === "true") {
                        parent.__ctlArcadeEndSession();
                    }
                });

                $(oMain).on("start_level", function (evt, iLevel) {
                    if (getParamValue('ctl-arcade') === "true") {
                        parent.__ctlArcadeStartLevel({level: iLevel});
						sdk.showBanner();
                    }
					sdk.showBanner();
                });

                $(oMain).on("restart_level", function (evt, iLevel) {
                    if (getParamValue('ctl-arcade') === "true") {
                        parent.__ctlArcadeRestartLevel({level: iLevel});
					sdk.showBanner();
                    }
					sdk.showBanner();
                });

                $(oMain).on("end_level", function (evt, iLevel) {
                    if (getParamValue('ctl-arcade') === "true") {
                        parent.__ctlArcadeEndLevel({level: iLevel});
                    }
                });

                $(oMain).on("save_score", function (evt, iScore, szMode) {
                    if (getParamValue('ctl-arcade') === "true") {
                        parent.__ctlArcadeSaveScore({score: iScore, mode: szMode});
                    }
                });

                $(oMain).on("show_interlevel_ad", function (evt) {
                    if (getParamValue('ctl-arcade') === "true") {
                        parent.__ctlArcadeShowInterlevelAD();
						sdk.showBanner();
                    }
				sdk.showBanner();
                });

                $(oMain).on("share_event", function (evt, iScore) {
                    if (getParamValue('ctl-arcade') === "true") {
                        parent.__ctlArcadeShareEvent({img: TEXT_SHARE_IMAGE,
                            title: TEXT_SHARE_TITLE,
                            msg: TEXT_SHARE_MSG1 + iScore + TEXT_SHARE_MSG2,
                            msg_share: TEXT_SHARE_SHARE1 + iScore + TEXT_SHARE_SHARE1});
                    }
					sdk.showBanner();
                });


                if (isIOS()) {
                    setTimeout(function () {
                        sizeHandler();
                    }, 200);
                } else {
                    sizeHandler();
                }
            });

        </script>
