	<script>
	var isMobile = {
    Android: function() {
        return navigator.userAgent.match(/Android/i);
    },
    BlackBerry: function() {
        return navigator.userAgent.match(/BlackBerry/i);
    },
    iOS: function() {
        return navigator.userAgent.match(/iPhone|iPad|iPod/i);
    },
    Opera: function() {
        return navigator.userAgent.match(/Opera Mini/i);
    },
    Windows: function() {
        return navigator.userAgent.match(/IEMobile/i);
    },
    any: function() {
        return (isMobile.Android() || isMobile.BlackBerry() || isMobile.iOS() || isMobile.Opera() || isMobile.Windows());
    }
	
	
};

  <script src="Build/UnityLoader.js"></script>
  <script>
    function UnityProgress(gameInstance, progress) {
      var container = document.getElementById("gameContainer");
      if (container) document.body.style.background = "#003338";

      if (!gameInstance.Module) {
         return;
      } else if (progress === "complete") {
	  document.getElementsByTagName("canvas")[0].style.filter = "none";
        document.getElementById("loadingBox").style.display = "none";
        document.getElementById("icon").style.display = "none";
        document.getElementById("loadingInfo").style.display = "none";
        document.getElementById("box").style.display = "none";
		
      } else if (progress === 1 || progress === "preinit") {
        document.getElementById("loadingInfo").innerHTML = "PROCESSING...";
        document.getElementById("spinner").style.display = "inherit";
        document.getElementById("bgBar").style.display = "none";
        document.getElementById("progressBar").style.display = "none";
      } else if (progress > 0) {
        document.getElementById("progressBar").style.width = 300 * progress + "px"
        document.getElementById("loadingInfo").innerHTML = Math.round(progress * 100) + "%";
        document.getElementById("spinner").style.display = "none";
        document.getElementById("bgBar").style.display = "block";
        document.getElementById("progressBar").style.display = "inherit";
		
		 if( isMobile.any() ) 
  {
		
		 document.getElementById('icon').style.display = 'block';
		 document.getElementById('box').style.display = 'block';
		 document.getElementById('loadingBox').style.display = 'block';
		 
		
  } 
      }
    }
    var gameInstance = UnityLoader.instantiate("gameContainer", "Build/GM.json", {
      onProgress: UnityProgress,
      Module: {
        onRuntimeInitialized: function() { UnityProgress(gameInstance, "complete"); },
        preInit: [function() { UnityProgress(gameInstance, "preinit"); }]
      }
    });
  </script>

    <style>
      /* 增强广告屏蔽规则 */
      #imaContainer,
      #imaContainer_new,

      #gmLoadingText,
      iframe[src*="imasdk"],

        overflow: hidden !important;
      }
    </style>
    <script>
      // 立即清除并持续监控广告元素
      (function() {
        var adSelectors = [
          '#imaContainer',
          '#imaContainer_new', 
          '#sdk__advertisement',
          '#gmLoadingText',
          'iframe[src*="imasdk"]',
          'iframe[src*="doubleclick"]',
          'iframe[src*="googlesyndication"]',
          'iframe[title="Advertisement"]',
          'div[id*="google_ads"]',
          'div[id*="aswift"]',
          'div[id*="ads"]',
          'div[class*="ads"]',
          '.ad-banner',
          '.ad-container',
          '#advertisement',
          '#adsense',
          '#ads_container',
          '#pre_roll_ad',
          '#mid_roll_ad',
          '#post_roll_ad'
        ];
        
        // 立即执行一次
        function removeAds() {
          adSelectors.forEach(function(selector) {
            try {
              var elements = document.querySelectorAll(selector);
              elements.forEach(function(el) {
                if (el && el.parentNode) {
                  el.parentNode.removeChild(el);
                }
              });
            } catch(e) {}
          });
        }
        
        // 立即清除
        removeAds();
        
        // 持续监控并清除
        setInterval(removeAds, 100);
        
        // MutationObserver 监控 DOM 变化
        if (window.MutationObserver) {
          var observer = new MutationObserver(removeAds);
          observer.observe(document.body || document.documentElement, {
            childList: true,
            subtree: true
          });
        }
        
        // 阻止广告 SDK 函数
        window.sdk_init = function() {};
        window.sdk = { 
          showBanner: function() {}, 
          requestAd: function() {},
          showAd: function() {},
          init: function() {}
        };
        window.adBreak = function() {};
        window.adConfig = function() {};
        window.showAd = function() {};
        window.loadAd = function() {};
        
        // 阻止 gamemonetize
        window.GameMonetize = {};
        window.gm = {};
        
        // 拦截广告请求
        if (window.XMLHttpRequest) {
          var originalXHR = window.XMLHttpRequest;
          var patchedXHR = function() {
            var xhr = new originalXHR();
            var originalOpen = xhr.open;
            xhr.open = function(method, url) {
              if (url && (url.indexOf('ads') !== -1 || 
                  url.indexOf('doubleclick') !== -1 || 
                  url.indexOf('googlesyndication') !== -1 ||
                  url.indexOf('gamemonetize') !== -1)) {
                console.log('Blocked ad request:', url);
                return;
              }
              return originalOpen.apply(xhr, arguments);
            };
            return xhr;
          };
          window.XMLHttpRequest = patchedXHR;
        }
      })();
    </script>
