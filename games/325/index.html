        // 拦截所有可能的广告函数
        var originalDefine = window.define;
        window.define = function() {
          // 阻止通过 define 加载广告 SDK
          if (arguments[0] && arguments[0].indexOf('gamemonetize') !== -1) {
            console.log('Blocked gamemonetize SDK load');
            return;
          }
          if (originalDefine) originalDefine.apply(this, arguments);
        };
        
        // 拦截 script 标签创建
        var originalCreateElement = document.createElement;
        document.createElement = function(tagName) {
          var element = originalCreateElement.call(document, tagName);
          if (tagName === 'script') {
            Object.defineProperty(element, 'src', {
              set: function(value) {
                if (value && value.indexOf('gamemonetize') !== -1) {
                  console.log('Blocked SDK script:', value);
                  return;
                }
                this.setAttribute('src', value);
              },
              get: function() {
                return this.getAttribute('src');
              }
            });
          }
          return element;
        };
      })();
      
      // 定期清除动态插入的广告元素

        ];
        
        adSelectors.forEach(function(selector) {
          var elements = document.querySelectorAll(selector);

            }
          });
        });

        // 阻止广告 SDK 函数

          window.GD_OPTIONS.onEvent = function() {
            console.log('GD_OPTIONS event blocked');
          };
        }
      }, 500);
