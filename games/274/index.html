    <script>
      // 拦截并阻止所有广告 SDK 加载
      (function() {
        // 保存原始函数
        const originalCreateElement = document.createElement;
        const originalSetAttribute = Element.prototype.setAttribute;
        
        // 重写 createElement 以拦截广告元素创建
        document.createElement = function(tagName) {
          const element = originalCreateElement.call(document, tagName);
          
          // 拦截 script 标签
          if (tagName.toLowerCase() === 'script') {
            const originalSrcSetter = Object.getOwnPropertyDescriptor(HTMLScriptElement.prototype, 'src').set;
            Object.defineProperty(element, 'src', {
              set: function(value) {
                // 检查是否为广告 SDK
                const adKeywords = ['gamemonetize', 'imasdk', 'doubleclick', 'googlesyndication', 
                                   'googleads', 'adservice', 'admob', 'adcolony', 'unityads',
                                   'chartboost', 'vungle', 'applovin', 'ironsource', 'facebook',
                                   'audienceetwork', 'admob', 'inmobi', 'millennial', 'smaato'];
                
                for (const keyword of adKeywords) {
                  if (value.toLowerCase().includes(keyword)) {
                    console.log('[广告拦截] 阻止广告 SDK 加载:', value);
                    return; // 不设置 src，阻止加载
                  }
                }
                originalSrcSetter.call(this, value);
              },
              get: function() {
                return originalCreateElement.call(document, tagName).src;
              }
            });
          }
          
          // 拦截 iframe 标签
          if (tagName.toLowerCase() === 'iframe') {
            const originalSrcSetter = Object.getOwnPropertyDescriptor(HTMLIFrameElement.prototype, 'src').set;
            Object.defineProperty(element, 'src', {
              set: function(value) {
                const adKeywords = ['imasdk', 'doubleclick', 'googlesyndication', 'gamemonetize',
                                   'googleads', 'adservice', 'admob'];
                
                for (const keyword of adKeywords) {
                  if (value.toLowerCase().includes(keyword)) {
                    console.log('[广告拦截] 阻止广告 iframe 加载:', value);
                    return;
                  }
                }
                originalSrcSetter.call(this, value);
              },
              get: function() {
                return originalCreateElement.call(document, tagName).src;
              }
            });
          }
          
          return element;
        };
        
        // 拦截 setAttribute 调用
        Element.prototype.setAttribute = function(name, value) {
          if (name.toLowerCase() === 'src' && this.tagName === 'SCRIPT') {
            const adKeywords = ['gamemonetize', 'imasdk', 'doubleclick', 'googlesyndication',
                               'googleads', 'adservice', 'admob', 'adcolony', 'unityads'];
            
            for (const keyword of adKeywords) {
              if (value.toLowerCase().includes(keyword)) {
                console.log('[广告拦截] 阻止广告脚本属性设置:', value);
                return; // 阻止设置
              }
            }
          }
          
          if (name.toLowerCase() === 'src' && this.tagName === 'IFRAME') {
            const adKeywords = ['imasdk', 'doubleclick', 'googlesyndication', 'gamemonetize',
                               'googleads', 'adservice'];
            
            for (const keyword of adKeywords) {
              if (value.toLowerCase().includes(keyword)) {
                console.log('[广告拦截] 阻止广告 iframe 属性设置:', value);
                return;
              }
            }
          }
          
          return originalSetAttribute.call(this, name, value);
        };
        
        // 拦截 XMLHttpRequest
        const originalXHR = window.XMLHttpRequest;
        window.XMLHttpRequest = function() {
          const xhr = new originalXHR();
          const originalOpen = xhr.open;
          const originalSend = xhr.send;

                return; // 阻止打开请求
              }
            }
            return originalOpen.apply(this, arguments);
          };
          
          return xhr;
        };
        
        // 拦截 fetch API
        const originalFetch = window.fetch;
        window.fetch = function(url, options) {
          const urlString = typeof url === 'string' ? url : url.url || '';
          const adKeywords = ['gamemonetize', 'imasdk', 'doubleclick', 'googlesyndication',
                             'googleads', 'adservice', 'admob', 'analytics'];

          return originalFetch.apply(this, arguments);
