    <script type = "text/javascript" >
         
        window.SDK_OPTIONS = {
           gameId: "3dq3v67d4nzzaar6yyeg8f2dhycp9dhh", // Fill the game_id
           onEvent: function (a) {
              switch (a.name) {
                 case "SDK_GAME_PAUSE":
                    // pause game logic / mute audio
                    on_ad=true;
                    if(sound_on)
                    {
                       play_pause();
                       prev_sound_on_value=true;
                    }
                    else
                    {
                       prev_sound_on_value=false;
                    }
                    
                    break;
                 case "SDK_GAME_START":
                    // advertisement done, resume game logic and unmute audio
                    on_ad=false;
                    if(prev_sound_on_value)
                    {
                       play_pause();
                    }
                    
                    time_to_ad=50*45;
                    break;
                 case "SDK_READY":
                    // when sdk is ready
                    ads_ready=true;
                    break;
                 case "SDK_ERROR":
                    // when sdk get error
                    ads_ready=false;
                    break;
              }
           }
        };
