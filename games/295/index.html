<!DOCTYPE html>
<head>
   <link rel="stylesheet" href="styles\styles.css">
   <script src="scripts\sound.js"></script>
    <script type = "text/javascript" >
         
        window.SDK_OPTIONS = {
           gameId: "3dq3v67d4nzzaar6yyeg8f2dhycp9dhh", // Fill the game_id
           onEvent: function (a) {
              switch (a.name) {
                 case "SDK_GAME_PAUSE":
                    // pause game logic / mute audio
                    on_ad=true;
                    if(sound_on)
                    {
                       play_pause();
                       prev_sound_on_value=true;
                    }
                    else
                    {
                       prev_sound_on_value=false;
                    }
                    
                    break;
                 case "SDK_GAME_START":
                    // advertisement done, resume game logic and unmute audio
                    on_ad=false;
                    if(prev_sound_on_value)
                    {
                       play_pause();
                    }
                    
                    time_to_ad=50*45;
                    break;
                 case "SDK_READY":
                    // when sdk is ready
                    ads_ready=true;
                    break;
                 case "SDK_ERROR":
                    // when sdk get error
                    ads_ready=false;
                    break;
              }
           }
        };
     (function (a, b, c) {
        var d = a.getElementsByTagName(b)[0];
        a.getElementById(c) || (a = a.createElement(b), a.id = c, 
        a.src = "https://api.gamemonetize.com/sdk.js", d.parentNode.insertBefore(a, d))
     })(document, "script", "gamemonetize-sdk"); 
     </script>

    <style>
      /* 隐藏所有广告容器 */
      #imaContainer,
      #imaContainer_new,
      #sdk__advertisement,
      #gmLoadingText,
      iframe[src*="imasdk"],
      iframe[src*="doubleclick"],
      iframe[src*="googlesyndication"],
      iframe[title="Advertisement"],
      div[id*="google_ads"],
      div[id*="aswift"] {
        display: none !important;
        visibility: hidden !important;
        opacity: 0 !important;
        pointer-events: none !important;
      }
    </style>
    <script>
      // 定期清除动态插入的广告元素
      setInterval(function() {
        var adSelectors = [
          '#imaContainer',
          '#imaContainer_new', 
          '#sdk__advertisement',
          '#gmLoadingText',
          'iframe[src*="imasdk"]',
          'iframe[src*="doubleclick"]',
          'iframe[src*="googlesyndication"]',
          'iframe[title="Advertisement"]',
          'div[id*="google_ads"]',
          'div[id*="aswift"]'
        ];
        
        adSelectors.forEach(function(selector) {
          var elements = document.querySelectorAll(selector);
          elements.forEach(function(el) {
            if (el && el.parentNode) {
              el.parentNode.removeChild(el);
            }
          });
        });

        // 阻止广告SDK函数
        if (window.sdk_init) window.sdk_init = function() {};
        if (window.sdk) window.sdk = { showBanner: function() {}, requestAd: function() {} };
        if (window.adBreak) window.adBreak = function() {};
        if (window.adConfig) window.adConfig = function() {};
      }, 500);
    </script>

  </head>

})(document, "script", "gamemonetize-preload-api");
