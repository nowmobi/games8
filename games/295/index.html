<!DOCTYPE html>
<head>
   <link rel="stylesheet" href="styles\styles.css">
   <script src="scripts\sound.js"></script>
    <script type = "text/javascript" >
         
        // 已禁用广告 SDK
        window.SDK_OPTIONS = {
           gameId: "3dq3v67d4nzzaar6yyeg8f2dhycp9dhh",
           onEvent: function (a) {
              // 广告事件已禁用
           }
        };
     // Gamemonetize SDK 已移除
     </script>

    <style>
      /* 隐藏所有广告容器 */
      #imaContainer,
      #imaContainer_new,
      #sdk__advertisement,
      #gmLoadingText,
      iframe[src*="imasdk"],
      iframe[src*="doubleclick"],
      iframe[src*="googlesyndication"],
      iframe[title="Advertisement"],
      div[id*="google_ads"],
      div[id*="aswift"] {
        display: none !important;
        visibility: hidden !important;
        opacity: 0 !important;
        pointer-events: none !important;
      }
    </style>
    <script>
      // 定期清除动态插入的广告元素
      setInterval(function() {
        var adSelectors = [
          '#imaContainer',
          '#imaContainer_new', 
          '#sdk__advertisement',
          '#gmLoadingText',
          'iframe[src*="imasdk"]',
          'iframe[src*="doubleclick"]',
          'iframe[src*="googlesyndication"]',
          'iframe[title="Advertisement"]',
          'div[id*="google_ads"]',
          'div[id*="aswift"]'
        ];
        
        adSelectors.forEach(function(selector) {
          var elements = document.querySelectorAll(selector);
          elements.forEach(function(el) {
            if (el && el.parentNode) {
              el.parentNode.removeChild(el);
            }
          });
        });

        // 阻止广告 SDK 函数
        if (window.sdk_init) window.sdk_init = function() {};
        if (window.sdk) window.sdk = { showBanner: function() {}, requestAd: function() {} };
        if (window.adBreak) window.adBreak = function() {};
        if (window.adConfig) window.adConfig = function() {};
      }, 500);
      
      // 拦截 SDK 对象访问
      var originalSDK = window.sdk;
      Object.defineProperty(window, 'sdk', {
        get: function() {
          return {
            showBanner: function() { console.log('广告已拦截'); },
            requestAd: function() { console.log('广告请求已拦截'); }
          };
        },
        set: function(val) {
          // 阻止设置真实的 SDK
          return false;
        }
      });
      
      // 拦截 SDK 初始化
      var _originalCreateElement = document.createElement;
      document.createElement = function(tagName) {
        var element = _originalCreateElement.call(document, tagName);
        if (tagName === 'script') {
          var _originalSetAttribute = element.setAttribute;
          element.setAttribute = function(name, value) {
            // 阻止加载广告相关脚本
            if (name === 'src' && (value.includes('gamemonetize') || value.includes('ads') || value.includes('sdk'))) {
              console.log('广告脚本已拦截:', value);
              return;
            }
            return _originalSetAttribute.call(this, name, value);
          };
        }
        return element;
      };
    </script>

  </head>
<html>
    <body id="mybody">
        <script src="scripts\context.js"></script>

         <script src="scripts\buttons.js"></script>
         <script src="scripts\start.js"></script>
        <script src="scripts\myscript.js"></script>

    <!-- Gamemonetize preload SDK 已移除 -->

</body>
</html>
