<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity WebGL Player | Parkaour Run 3D</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
    <script src="TemplateData/UnityProgress.js"></script>
    <script src="Build/UnityLoader.js"></script>
    <script>
      var unityInstance = UnityLoader.instantiate("unityContainer", "Build/ParkourRun3D.json", {onProgress: UnityProgress});
    </script>
	
	<script>
      // 拦截广告 SDK 加载
      (function() {
        // 阻止 gamemonetize SDK
        window.gamemonetize = {};
        
        // 拦截脚本加载
        var originalCreateElement = document.createElement;
        document.createElement = function(tagName) {
          var element = originalCreateElement.call(document, tagName);
          if (tagName.toLowerCase() === 'script') {
            var originalSetAttribute = element.setAttribute;
            element.setAttribute = function(name, value) {
              // 拦截广告相关的脚本
              if (name.toLowerCase() === 'src' && (
                  value.indexOf('gamemonetize') !== -1 ||
                  value.indexOf('googleads') !== -1 ||
                  value.indexOf('doubleclick') !== -1 ||
                  value.indexOf('googlesyndication') !== -1 ||
                  value.indexOf('imasdk') !== -1 ||
                  value.indexOf('googletagmanager') !== -1
                )) {
                console.log('Blocked ad script:', value);
                return;
              }
              return originalSetAttribute.call(element, name, value);
            };
          }
          return element;
        };
        
        // 定期清除动态插入的广告元素
        setInterval(function() {
          var adSelectors = [
            '#imaContainer',
            '#imaContainer_new', 
            '#sdk__advertisement',
            '#gmLoadingText',
            'iframe[src*="imasdk"]',
            'iframe[src*="doubleclick"]',
            'iframe[src*="googlesyndication"]',
            'iframe[title="Advertisement"]',
            'div[id*="google_ads"]',
            'div[id*="aswift"]'
          ];
          
          adSelectors.forEach(function(selector) {
            var elements = document.querySelectorAll(selector);
            elements.forEach(function(el) {
              if (el && el.parentNode) {
                el.parentNode.removeChild(el);
              }
            });
          });

          // 阻止广告 SDK 函数
          if (window.sdk_init) window.sdk_init = function() {};
          if (window.sdk) window.sdk = { showBanner: function() {}, requestAd: function() {} };
          if (window.adBreak) window.adBreak = function() {};
          if (window.adConfig) window.adConfig = function() {};
        }, 500);
      })();
    </script>
  </head>
  <body>
    <div class="webgl-content">
      <div id="unityContainer" style="width: 420px; height: 700px"></div>
    </div>
  </body>
</html>
