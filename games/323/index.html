<script>
// 更强的广告拦截和清理函数
(function() {
  // 阻止广告 SDK 加载
  var originalCreateElement = document.createElement;
  document.createElement = function(tagName) {
    var element = originalCreateElement.call(document, tagName);
    return element;
  };

  // 监控并移除广告脚本注入
  var originalAppendChild = Node.prototype.appendChild;
  Node.prototype.appendChild = function(node) {
    if (node && node.src && (
        node.src.includes('gamemonetize') ||
        node.src.includes('imasdk') ||
        node.src.includes('doubleclick') ||
        node.src.includes('googlesyndication') ||
        node.id === 'gamemonetize-preload-api'
    )) {
      console.log('Blocked ad script:', node.src);
      return null;
    }
    return originalAppendChild.call(this, node);
  };

  // 定期清除动态插入的广告元素
  setInterval(function() {
    var adSelectors = [
      '#imaContainer',
      '#imaContainer_new', 
      '#sdk__advertisement',
      '#gmLoadingText',
      'iframe[src*="imasdk"]',
      'iframe[src*="doubleclick"]',
      'iframe[src*="googlesyndication"]',
      'iframe[title="Advertisement"]',
      'div[id*="google_ads"]',
      'div[id*="aswift"]',
      '[class*="ads"]',
      '[id*="ads"]'
    ];
    
    adSelectors.forEach(function(selector) {
      var elements = document.querySelectorAll(selector);
      elements.forEach(function(el) {
        if (el && el.parentNode) {
          el.parentNode.removeChild(el);
        }
      });
    });

    // 阻止广告 SDK 函数
    if (window.sdk_init) window.sdk_init = function() {};
    if (window.sdk) window.sdk = { showBanner: function() {}, requestAd: function() {} };
    if (window.adBreak) window.adBreak = function() {};
    if (window.adConfig) window.adConfig = function() {};
    if (window.GameMonetize) window.GameMonetize = {};
    if (window.gm_ad) window.gm_ad = function() {};
  }, 500);

  // 覆盖广告显示函数
  var originalShow = HTMLElement.prototype.show;
  if (originalShow) {
    HTMLElement.prototype.show = function() {
      if (this.id && (
          this.id.includes('ad') || 
          this.id.includes('advert') ||
          this.id.includes('sponsor'))) {
        return;
      }
      return originalShow.call(this);
    };
  }

  // 阻止弹窗广告
  var originalOpen = window.open;
  window.open = function(url, name, specs) {
    if (url && (
        url.includes('ad') || 
        url.includes('advert') ||
        url.includes('sponsor') ||
        url.includes('click'))) {
      console.log('Blocked ad popup:', url);
      return null;
    }
    return originalOpen.call(window, url, name, specs);
  };
})();
</script>
