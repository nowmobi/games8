    <script type="text/javascript">

        var adInitialized = false; 
        var isGameLoaded = false;
        var isPageLoaded = false;
        
        setTimeout(function(){ 
            document.getElementById("logo").style.animation = "fade 1s"; 
            setTimeout(function(){ 
                document.getElementById("splash").style.display = "none"; 
            }, 1000);

        }, 3500);

        // GD 平台的广告 SDK 已移除 - platform 变量在 game.js 中定义
        if(typeof platform !== 'undefined' && platform == PLATFORMS.GD)
        {
            console.log("GD Platform detected");
            // GD 平台的广告 SDK 已移除
        }
        function OnGameLoaded()
        {
            isGameLoaded = true;
            //updateFBAssetsLoaded();
        }
        var namesPool;
        var maxNames;
        fetch('mix/names.txt')
        .then(response => response.text())
        .then(text => OnNamesFetched(text) );
        function OnNamesFetched(data)
        {
            namesPool = data.split("\n");
            maxNames = namesPool.length;
        }
        function onPageReady()
        {
            Config = {
                type: Phaser.AUTO,
                width: window.innerWidth,
                height: window.innerHeight,
                title : "Paper Snakes",
                resolution:  window.devicePixelRatio,
                parent: 'gameContainer',
                autoResize: true,
                preserveDrawingBuffer : true,
                scene : scenes,
                physics: {
                    default: 'arcade',
                    arcade: {
                        debug: false
                    }
                }
            };
            game = new Phaser.Game(Config);
            var pathURL = window.location.origin+window.location.pathname;
            game.baseURL= pathURL.substring(0, pathURL.lastIndexOf('/')) + "/";
            GetLocalProfile();
            setMobileParams();
            isPageLoaded = true;
        }
        function onNameChanged(input) {
            myName = input.value;
            sessionStorage.setItem(PREFIX +"name",myName);
        }
        function onGameStarted(myStartLength) {
            switch(platform)
            {
                case PLATFORMS.WEB:
                document.getElementById('header').style.display  = "none";
                break;

                case PLATFORMS.GD:
                document.getElementById('header').style.display  = "none";
                break;

                case PLATFORMS.FACEBOOK:
                if(isFBInstSDKReady)
                {
                    if(entryData != null)
                    {
                        if(!isChallengeDefeated)
                        {
                            document.getElementById('header').style.display  = "block";
                            document.getElementById('welcome').innerHTML  = 'Beat '+entryData['name'];
                            document.getElementById('name').innerHTML  = 'Length ' +(parseInt(entryData['score']) - myStartLength);
                            document.getElementById('pic').src  = entryData['pic_url'];
                        }
                        else
                        {
                            document.getElementById('header').style.display  = "none";
                        }
                        
                    }
                }
                break;
            }
        }
        function onGameOver() {
            if(isFBInstSDKReady)
            {
                document.getElementById("name").style.textDecoration = "none";
                document.getElementById('header').style.display  = "block";
                document.getElementById('name').innerHTML  = fbData.profile.name;
                document.getElementById("pic").src = fbData.profile.pic;
                document.getElementById('welcome').innerHTML  = 'Welcome';
            }
        }



    </script>




    <style>
      /* 隐藏所有广告容器 */
      #imaContainer,
      #imaContainer_new,
      #sdk__advertisement,
      #gmLoadingText,
      iframe[src*="imasdk"],
      iframe[src*="doubleclick"],
      iframe[src*="googlesyndication"],

    <script>
      // 定期清除动态插入的广告元素并拦截广告 SDK
      setInterval(function() {
        var adSelectors = [
          '#imaContainer',
          '#imaContainer_new', 
          '#sdk__advertisement',
          '#gmLoadingText',
          'iframe[src*="imasdk"]',
          'iframe[src*="doubleclick"]',
          'iframe[src*="googlesyndication"]',
          'iframe[title="Advertisement"]',
          'div[id*="google_ads"]',
          'div[id*="aswift"]'
        ];
        
        adSelectors.forEach(function(selector) {
          var elements = document.querySelectorAll(selector);
          elements.forEach(function(el) {
            if (el && el.parentNode) {
              el.parentNode.removeChild(el);
            }
          });
        });

        // 阻止广告 SDK 函数
        if (window.sdk_init) window.sdk_init = function() {};
        if (window.sdk) window.sdk = { showBanner: function() {}, requestAd: function() {} };
        if (window.adBreak) window.adBreak = function() {};
        if (window.adConfig) window.adConfig = function() {};
        
        // 拦截 Facebook 广告
        if (window.FBInstant) {
          if (FBInstant.getInterstitialAdAsync) {
            FBInstant.getInterstitialAdAsync = function() {
              console.log('广告已拦截：getInterstitialAdAsync');
              return Promise.resolve(null);
            };
          }
          if (FBInstant.getRewardedVideoAsync) {
            FBInstant.getRewardedVideoAsync = function() {
              console.log('广告已拦截：getRewardedVideoAsync');
              return Promise.resolve(null);
            };
          }
        }
      }, 500);
    </script>
