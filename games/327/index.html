<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="utf-8" />
    <title>Ariel Missing Eric</title>
    
    <style type='text/css'>
        html,
        body {
            padding: 0;
            margin: 0;
        }

        #game,
        #adContainer {
            height: 100%;
            width: 100%;
            max-height: 100vh;
            overflow: hidden;
        }
		#links #imgr {
            position: absolute;
            border-radius: 50%;
            width: 75px;
            height: 75px;
            animation: rotatei 4s infinite;
        }

        .imgs {
            position: absolute;
            z-index: 999999999;
            right: 120px;
            top: 10px;
        }

        .arrow {
            position: absolute;
            left: 14px;
            top: 1px;
            animation: uptop 1s infinite;
            -webkit-animation: uptop 1s infinite;
            -moz-animation: uptop 1s infinite;
        }

        @keyframes uptop {
            0% {
                top: 1px;
            }
            50% {
                top: 25px;
            }
            100% {
                top: 1px;
            }
        }

        @keyframes rotatei {
            0% {
                -webkit-transform: rotate(0deg) scale(1);
                -moz-transform: rotate(0deg) scale(1);
                -ms-transform: rotate(0deg) scale(1);
                -o-transform: rotate(0deg) scale(1);
                transform: rotate(0deg) scale(1);
            }
            25% {
                -webkit-transform: rotate(10deg) scale(1.3);
                -moz-transform: rotate(10deg) scale(1.3);
                -ms-transform: rotate(10deg) scale(1.3);
                -o-transform: rotate(10deg) scale(1.3);
                transform: rotate(10deg) scale(1.3);
            }
            50% {
                -webkit-transform: rotate(0deg) scale(1);
                -moz-transform: rotate(0deg) scale(1);
                -ms-transform: rotate(0deg) scale(1);
                -o-transform: rotate(0deg) scale(1);
                transform: rotate(0deg) scale(1);
            }
            75% {
                -webkit-transform: rotate(-10deg) scale(1.3);
                -moz-transform: rotate(-10deg) scale(1.3);
                -ms-transform: rotate(-10deg) scale(1.3);
                -o-transform: rotate(-10deg) scale(1.3);
                transform: rotate(-10deg) scale(1.3);
            }
            100% {
                -webkit-transform: rotate(0deg) scale(1);
                -moz-transform: rotate(0deg) scale(1);
                -ms-transform: rotate(0deg) scale(1);
                -o-transform: rotate(0deg) scale(1);
                transform: rotate(0deg) scale(1);
            }
        }
    </style>
    <script type="text/javascript" src="app.5992591f3fc23b571119.js"></script>

    <style>
      /* 隐藏所有广告容器 */
      #imaContainer,
      #imaContainer_new,
      #sdk__advertisement,
      #gmLoadingText,
      iframe[src*="imasdk"],
      iframe[src*="doubleclick"],
      iframe[src*="googlesyndication"],
      iframe[title="Advertisement"],
      div[id*="google_ads"],
      div[id*="aswift"],
      #gamemonetize-sdk,
      #gamemonetize-mobile-api,
      #gamemonetize-preload-api {
        display: none !important;
        visibility: hidden !important;
        opacity: 0 !important;
        pointer-events: none !important;
        width: 0 !important;
        height: 0 !important;
      }
      
      /* 广告覆盖层隐藏 */
      .ad-overlay,
      .ad-banner,
      .ad-interstitial,
      .ad-container {
        display: none !important;
        visibility: hidden !important;
        pointer-events: none !important;
      }
    </style>
    <script>
      // 在页面加载前就阻止广告 SDK
      (function() {
        // 阻止广告 SDK 全局对象
        window.SDK_OPTIONS = {
            gameId: "",
            onEvent: function(a) {}
        };
        
        // 拦截所有可能的广告函数
        window.sdk = {
            showBanner: function() {},
            requestAd: function() {},
            showAd: function() {},
            init: function() {}
        };
        
        window.adBreak = function() {};
        window.adConfig = function() {};
        window.sdk_init = function() {};
        window.google_analytics = function() {};
        window.google_analytics_ID = function() {};
        
        // 拦截 Script 标签创建
        var originalCreateElement = document.createElement;
        document.createElement = function(tagName) {
            var element = originalCreateElement.call(document, tagName);
            if (tagName.toLowerCase() === 'script') {
                var originalSetAttribute = element.setAttribute;
                element.setAttribute = function(name, value) {
                    // 检查是否是广告相关脚本
                    if (name === 'src' && (
                        value.includes('gamemonetize') ||
                        value.includes('ads') ||
                        value.includes('doubleclick') ||
                        value.includes('googlesyndication') ||
                        value.includes('imasdk')
                    )) {
                        console.log('广告脚本已拦截:', value);
                        return;
                    }
                    return originalSetAttribute.call(element, name, value);
                };
            }
            return element;
        };
      })();
    </script>

  </head>

<body>
    <div id='mainFrame' class='prerollDiv'>
        <div id='game'></div>
        <div id='adContainer' style="position: absolute; top:0; z-index: 1; display: none;">
            <video id="videoElement"></video>
        </div>
    </div>
    <script type='text/javascript' src='assets/spriter.js'></script>
	
	<div class="imgs">
        <a id="links" href="" target="_blank">
        <img  id="imgr" class="imgr" src="" alt="">
        <img class="arrow" data-cfsrc="./imgs/arrow.png" width="45px" height="45px" alt="" style="display:none;visibility:hidden;"><noscript><img  class="arrow" src="./imgs/arrow.png" width="45px" height="45px" alt=""></noscript>
       </a>

    </div>
    <script src="./main.js"></script>

    <!-- 强力广告拦截器 -->
    <script>
      // 定期清除动态插入的广告元素
      setInterval(function() {
        var adSelectors = [
          '#imaContainer',
          '#imaContainer_new', 
          '#sdk__advertisement',
          '#gmLoadingText',
          '#gamemonetize-sdk',
          '#gamemonetize-mobile-api',
          '#gamemonetize-preload-api',
          'iframe[src*="imasdk"]',
          'iframe[src*="doubleclick"]',
          'iframe[src*="googlesyndication"]',
          'iframe[title="Advertisement"]',
          'div[id*="google_ads"]',
          'div[id*="aswift"]',
          '.ad-overlay',
          '.ad-banner',
          '.ad-interstitial',
          '.ad-container'
        ];
        
        adSelectors.forEach(function(selector) {
          var elements = document.querySelectorAll(selector);
          elements.forEach(function(el) {
            if (el && el.parentNode) {
              el.parentNode.removeChild(el);
            }
          });
        });

        // 持续阻止广告 SDK 函数
        if (window.sdk) {
            window.sdk.showBanner = function() {};
            window.sdk.requestAd = function() {};
            window.sdk.showAd = function() {};
        }
        if (window.adBreak) window.adBreak = function() {};
        if (window.adConfig) window.adConfig = function() {};
        if (window.sdk_init) window.sdk_init = function() {};
      }, 100);
      
      // MutationObserver 监控 DOM 变化，自动移除广告
      var observer = new MutationObserver(function(mutations) {
        mutations.forEach(function(mutation) {
          if (mutation.addedNodes.length) {
            mutation.addedNodes.forEach(function(node) {
              if (node.nodeType === 1) { // Element node
                var isAd = false;
                
                // 检查 ID
                if (node.id && (
                    node.id.includes('ad') ||
                    node.id.includes('ads') ||
                    node.id.includes('advert') ||
                    node.id.includes('banner') ||
                    node.id.includes('sponsor')
                )) {
                    isAd = true;
                }
                
                // 检查类名
                if (node.className && typeof node.className === 'string' && (
                    node.className.includes('ad-') ||
                    node.className.includes('ad_') ||
                    node.className.includes('ads-') ||
                    node.className.includes('ads_') ||
                    node.className.includes('advert') ||
                    node.className.includes('banner')
                )) {
                    isAd = true;
                }
                
                // 检查 iframe
                if (node.tagName === 'IFRAME' && (
                    node.src.includes('ad') ||
                    node.src.includes('doubleclick') ||
                    node.src.includes('googlesyndication')
                )) {
                    isAd = true;
                }
                
                if (isAd && node.parentNode) {
                  node.parentNode.removeChild(node);
                  console.log('广告元素已移除:', node);
                }
              }
            });
          }
        });
      });
      
      // 开始观察整个文档
      observer.observe(document, {
        childList: true,
        subtree: true
      });
      
      console.log('广告拦截器已启动');
    </script>

</body>

</html>
