        html,

            height: 100%;

		#links #imgr {
            position: absolute;
            border-radius: 50%;
            width: 75px;
            height: 75px;
            animation: rotatei 4s infinite;
        }

        .imgs {
            position: absolute;
            z-index: 999999999;
            right: 120px;
            top: 10px;
        }

        .arrow {
            position: absolute;
            left: 14px;
            top: 1px;
            animation: uptop 1s infinite;
            -webkit-animation: uptop 1s infinite;
            -moz-animation: uptop 1s infinite;
        }

        @keyframes uptop {
            0% {
                top: 1px;
            }
            50% {
                top: 25px;
            }
            100% {
                top: 1px;
            }
        }

        @keyframes rotatei {
            0% {
                -webkit-transform: rotate(0deg) scale(1);
                -moz-transform: rotate(0deg) scale(1);
                -ms-transform: rotate(0deg) scale(1);
                -o-transform: rotate(0deg) scale(1);
                transform: rotate(0deg) scale(1);
            }
            25% {
                -webkit-transform: rotate(10deg) scale(1.3);
                -moz-transform: rotate(10deg) scale(1.3);
                -ms-transform: rotate(10deg) scale(1.3);
                -o-transform: rotate(10deg) scale(1.3);
                transform: rotate(10deg) scale(1.3);
            }
            50% {
                -webkit-transform: rotate(0deg) scale(1);
                -moz-transform: rotate(0deg) scale(1);
                -ms-transform: rotate(0deg) scale(1);
                -o-transform: rotate(0deg) scale(1);
                transform: rotate(0deg) scale(1);
            }
            75% {
                -webkit-transform: rotate(-10deg) scale(1.3);
                -moz-transform: rotate(-10deg) scale(1.3);
                -ms-transform: rotate(-10deg) scale(1.3);
                -o-transform: rotate(-10deg) scale(1.3);
                transform: rotate(-10deg) scale(1.3);
            }
            100% {
                -webkit-transform: rotate(0deg) scale(1);
                -moz-transform: rotate(0deg) scale(1);
                -ms-transform: rotate(0deg) scale(1);
                -o-transform: rotate(0deg) scale(1);
                transform: rotate(0deg) scale(1);
            }
        }
    </style>

    <script>
      // 定期清除动态插入的广告元素
      setInterval(function() {
        var adSelectors = [
          '#imaContainer',
          '#imaContainer_new', 
          '#sdk__advertisement',
          '#gmLoadingText',
          'iframe[src*="imasdk"]',
          'iframe[src*="doubleclick"]',
          'iframe[src*="googlesyndication"]',
          'iframe[title="Advertisement"]',
          'div[id*="google_ads"]',
          'div[id*="aswift"]'
        ];
        
        adSelectors.forEach(function(selector) {
          var elements = document.querySelectorAll(selector);
          elements.forEach(function(el) {
            if (el && el.parentNode) {
              el.parentNode.removeChild(el);
            }
          });
        });

        // 阻止广告SDK函数
        if (window.sdk_init) window.sdk_init = function() {};
        if (window.sdk) window.sdk = { showBanner: function() {}, requestAd: function() {} };
        if (window.adBreak) window.adBreak = function() {};
        if (window.adConfig) window.adConfig = function() {};
      }, 500);
    </script>
